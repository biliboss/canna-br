# lefthook.yml — quality gates, trunk-only main.
#
# These are GATES: exit≠0 BLOCKS the commit/push (that is the goal).
# Distinct from Claude Code lifecycle hooks (Stop/PreTool), which are OPTIMISTIC
# and never block a turn. See [[feedback-quality-gates-trunk-only]] vs
# [[feedback-claude-code-hooks-optimistic]].
#
# Install (idempotent): pnpm gates:install   (→ lefthook install)
# Contract self-check:   pnpm gates:verify    (→ node scripts/assert-gates.mjs)

pre-commit:
  parallel: false
  commands:
    01-main-guard:
      run: |
        branch="$(git rev-parse --abbrev-ref HEAD)"
        if [ "$branch" != "main" ]; then
          echo "✗ trunk-only: commits só na main (branch atual: $branch)" >&2
          exit 1
        fi
    02-typecheck:
      # Code packages only (positive-select; @canna/agent is already outside the
      # pnpm workspace). @canna/docs runs `astro check` which is slow AND crashes
      # (SIGABRT) — too heavy for a per-commit gate and it would trap the pipeline;
      # public docs are guarded by 03-no-infra-host instead. The `!pkg` exclusion
      # filter does NOT reliably exclude under `pnpm -r`, so we enumerate.
      # @types/node is pinned to ^22 (root pnpm.overrides) so apps/mcp typechecks
      # green on any local node, matching the deploy target.
      run: pnpm --filter='./packages/*' --filter='@canna/api' --filter='@canna/mcp' --filter='@canna/worker' --if-present typecheck
    03-no-infra-host-in-public-docs:
      # [[feedback-no-infra-hosts-public-docs]] — infra host = org-secret, NUNCA
      # no docsite público. Falha se um arquivo staged sob apps/docs/src/ vazar.
      glob: "apps/docs/src/**/*"
      run: |
        leak="$(grep -l "fonsecagabriel" {staged_files} 2>/dev/null || true)"
        if [ -n "$leak" ]; then
          echo "✗ host infra 'fonsecagabriel' vazou em doc público:" >&2
          echo "$leak" >&2
          exit 1
        fi

post-commit:
  # Observabilidade do trio backlog→code→green. Roda PÓS-commit (não pode
  # bloquear); best-effort, sempre exit 0.
  commands:
    flow-log:
      run: |
        sha="$(git rev-parse --short HEAD 2>/dev/null || echo '?')"
        subj="$(git log -1 --pretty=%s 2>/dev/null || echo '?')"
        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        mkdir -p .canna 2>/dev/null || true
        echo "$ts $sha $subj" >> .canna/flow.log 2>/dev/null || true
        exit 0

pre-push:
  parallel: false
  commands:
    01-main-guard:
      run: |
        branch="$(git rev-parse --abbrev-ref HEAD)"
        if [ "$branch" != "main" ]; then
          echo "✗ trunk-only: push só da main (branch atual: $branch)" >&2
          exit 1
        fi
    02-validate-typecheck:
      # Full-suite typecheck gate (mirrors `pnpm validate:typecheck`). Catches
      # type breaks across every workspace package before they hit the trunk.
      run: pnpm validate:typecheck
    02-test:
      run: pnpm -r --if-present test
    03-build-widgets:
      run: pnpm --filter @canna/ui-apps build
    04-smoke-prod:
      # SMOKE de PRODUÇÃO — [[feedback-test-in-production]]. app.cannabr.org deve
      # responder 200 ou o push é BLOQUEADO.
      run: |
        code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 https://app.cannabr.org/health || echo 000)"
        if [ "$code" != "200" ]; then
          echo "✗ smoke prod: app.cannabr.org/health = $code (esperado 200)" >&2
          exit 1
        fi
        echo "✓ smoke prod app.cannabr.org/health = 200"
    05-coverage-gate:
      # cb-pre-push-gate-full-suite — run domain coverage, emit
      # releases/coverage.json, and BLOCK the push if line coverage drops below
      # COVERAGE_FLOOR (default 90; baseline at introduction was 93.61%).
      run: pnpm coverage:report
    06-e2e-gate:
      # cb-e2e-gate-pre-merge (wave.9) — LOCAL-FIRST e2e gate. Brings up the
      # deterministic local MCP stack (docker pg + seed + tsx mcp server), runs
      # the wave.8 JOURNEY + WIDGET e2es against it, tears it down. A red e2e
      # BLOCKS the push. This is the local-CI-by-hooks gate: it runs here on the
      # dev box, no GH Actions runner required. PROVEN green locally
      # (11 passed, 2026-06-17). The prod-targeted member-quota-card.e2e.ts is
      # NOT in this gate — it runs via `pnpm test:e2e:prod` against prod.
      #
      # Best-effort on boxes without docker (skips, exit 0). To HARD-fail when
      # docker is missing: CB_E2E_GATE_REQUIRE_DOCKER=1.
      run: pnpm test:e2e:gate
    07-okf-gate:
      # cb-w12 Camada OKF — OKF (Open Knowledge Format v0.1) conformance gate
      # over the apps/docs/okf/ knowledge bundle: E1 (frontmatter parseável),
      # E2 (type não-vazio), E3 (index.md/log.md estruturais). Non-conformant
      # bundle BLOCKS the push. Pure bash, no deps. See apps/docs/okf/index.md.
      run: bash scripts/validate-okf.sh
