# canna-oss — Kamal v2 deploy config
# Target: VPS 62.171.145.76 (shared w/ Langfuse), kamal-proxy on :80/:443
# DNS:   wildcard *.fonsecagabriel.com.br
#
# REUSE PATTERNS (from _memory/feedback-kamal-v2-gotchas.md):
#   - env.clear does NOT expand $VAR — composite secrets live in env.secret
#   - registry.server: localhost:5555 → skips docker login
#   - deploy_timeout: 240 (default 30s is too short for cold start)
#   - omit accessory ports (Docker network kamal handles intra-stack)
#   - SSH via IP, not hostname
#
# STATUS (2026-06-08): SCAFFOLD ONLY — NOT DEPLOYABLE YET.
# Blockers:
#   1. apps/api, apps/mcp, apps/worker have NO transport wiring (no app.listen,
#      no StdioServerTransport). Need entrypoint files before Dockerfiles can
#      build a runnable image. See deploy-evidence.md.
#   2. Secrets not yet in Bitwarden (or BW vault was locked during deploy attempt).
#
# When unblocked: `kamal setup` first, then `kamal deploy --version v0.2.1`.

service: canna-stack
image: biliboss/canna

servers:
  web:
    hosts:
      - 62.171.145.76
    labels:
      service: canna-api
  worker:
    hosts:
      - 62.171.145.76
    cmd: node /app/apps/worker/dist/server.js
    options:
      cap-add: true
  mcp:
    hosts:
      - 62.171.145.76
    cmd: node /app/apps/mcp/dist/server.js
    labels:
      service: canna-mcp

# kamal-proxy already running on the host on :80/:443 (Langfuse + 14 apps share it).
# Each role declares its public host; kamal-proxy fans out by Host header.
proxy:
  ssl: true
  app_port: 3000
  healthcheck:
    path: /health
    interval: 5
    timeout: 60
  hosts:
    - canna.fonsecagabriel.com.br

# Per-role proxy overrides — apps/mcp on its own hostname + port
# (Kamal v2 supports per-role proxy block).
# NOTE: if apps/mcp ships HTTP/SSE (v0.2.1.x), expose 3001. For stdio in v0.2.1
# the mcp role is reachable only via OWUI container exec, not via proxy.

registry:
  # localhost:5555 trick → skips docker login (kamal/commands/registry.rb)
  server: localhost:5555
  username: kamal
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  remote: ssh://root@62.171.145.76
  args:
    NODE_VERSION: "20"

# Cold-start budget: pnpm install + 11 workspaces + Fastify boot ≈ 30-60s
deploy_timeout: 240
drain_timeout: 30

# Composite secrets — built externally (envless or 1Password) — NOT $VAR-templated here
env:
  clear:
    NODE_ENV: production
    LOG_LEVEL: info
    TZ: UTC
  secret:
    - DATABASE_URL          # postgresql://canna:URL_ENCODED_PW@canna-postgres:5432/canna
    - REDIS_URL             # redis://canna-redis:6379/0
    - WEBUI_SECRET_KEY
    - JWT_SECRET
    - SITE_KEK_SEED         # @canna/crypto envelope encryption seed
    - LANGFUSE_PUBLIC_KEY   # observability — reuses langfuse.fonsecagabriel.com.br
    - LANGFUSE_SECRET_KEY
    - LANGFUSE_HOST

accessories:
  postgres:
    image: postgres:16-alpine
    host: 62.171.145.76
    # NO ports: — accessories talk via Docker `kamal` network
    env:
      clear:
        POSTGRES_DB: canna
        POSTGRES_USER: canna
        PGTZ: UTC
        TZ: UTC
      secret:
        - POSTGRES_PASSWORD
    directories:
      - canna_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    host: 62.171.145.76
    cmd: redis-server --appendonly yes
    directories:
      - canna_redis_data:/data

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    host: 62.171.145.76
    # Proxy fan-out: this accessory is exposed at webui.canna.fonsecagabriel.com.br
    # via a separate role definition OR via kamal-proxy labels. Kamal v2
    # accessory proxy is in preview — fallback is to define openwebui as a
    # second `servers.<role>:` block once an image with `/health` is confirmed.
    # For v0.2.1 the upstream image already exposes /health (verified locally).
    proxy:
      ssl: true
      app_port: 8080
      healthcheck:
        path: /health
        interval: 10
        timeout: 60
      hosts:
        - webui.canna.fonsecagabriel.com.br
    env:
      clear:
        ENABLE_PASSWORD_FORM: "False"
        ENABLE_KB_EXEC: "False"
        ENABLE_COMMUNITY_SHARING: "False"
        ENABLE_MESSAGE_RATING: "True"
        SCARF_NO_ANALYTICS: "true"
        DO_NOT_TRACK: "true"
        ANONYMIZED_TELEMETRY: "false"
        MCP_INITIALIZE_TIMEOUT: "30000"
        CHAT_RESPONSE_MAX_TOOL_CALL_ITERATIONS: "256"
        UVICORN_WORKERS: "2"
        WEBUI_URL: https://webui.canna.fonsecagabriel.com.br
      secret:
        - WEBUI_DATABASE_URL    # postgresql://openwebui:URL_ENC_PW@canna-postgres:5432/openwebui
        - WEBUI_REDIS_URL       # redis://canna-redis:6379/1
        - WEBUI_SECRET_KEY
    directories:
      - canna_webui_data:/app/backend/data
