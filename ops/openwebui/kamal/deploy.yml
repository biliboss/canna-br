# canna-oss — Kamal v2 deploy config (v0.2.1.1)
# Target: VPS 62.171.145.76 (shared w/ Langfuse + 14 other Kamal apps)
# DNS:   wildcard *.cannabr.org
#
# REUSE PATTERNS (from _memory/feedback-kamal-v2-gotchas.md):
#   - env.clear does NOT expand $VAR — composite secrets live in env.secret
#   - registry.server: localhost:5555 → skips docker login
#   - deploy_timeout: 240 (default 30s is too short for cold start)
#   - omit accessory ports (Docker network kamal handles intra-stack)
#   - SSH via IP, not hostname
#
# Kamal v2 multi-role pattern: each `servers.<role>` is a separate image
# pulled from registry. We build 3 images locally and tag them under the
# same `image:` prefix so Kamal can resolve by role suffix... but actually
# Kamal does ONE image per service. So we keep ONE image (canna-app) that
# bundles all 3 apps and use role-level `cmd:` to pick which entrypoint
# runs. Builder builds apps/api/Dockerfile only — mcp + worker share the
# same image but override the CMD.
#
# NOTE: This means apps/mcp/Dockerfile and apps/worker/Dockerfile are
# kept as docs/test artifacts only; the deployed image is built from
# apps/api/Dockerfile which copies ALL of packages/ + apps/. We override
# CMD per role.

service: canna-stack
image: canna-stack

servers:
  web:
    hosts:
      - 62.171.145.76
    proxy:
      ssl: true
      app_port: 3000
      healthcheck:
        path: /health
        interval: 5
        timeout: 60
      hosts:
        - api.cannabr.org

  mcp:
    hosts:
      - 62.171.145.76
    cmd: node --experimental-strip-types --no-warnings=ExperimentalWarning apps/mcp/src/main.ts
    proxy:
      ssl: true
      app_port: 3001
      healthcheck:
        path: /health
        interval: 5
        timeout: 60
      hosts:
        - mcp.cannabr.org

  worker:
    hosts:
      - 62.171.145.76
    cmd: node --experimental-strip-types --no-warnings=ExperimentalWarning apps/worker/src/server.ts
    # worker exposes /health on 3002 but is not publicly routable

registry:
  # localhost:5555 trick → skips docker login (kamal/commands/registry.rb)
  server: localhost:5555
  username: kamal
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  remote: ssh://root@62.171.145.76
  dockerfile: apps/api/Dockerfile
  context: .
  args:
    NODE_VERSION: "22"

# Cold-start budget: pnpm install + 11 workspaces + Fastify boot ≈ 30-60s
deploy_timeout: 240
drain_timeout: 30

# Composite secrets — built externally — NOT $VAR-templated here
env:
  clear:
    NODE_ENV: production
    LOG_LEVEL: info
    TZ: UTC
  secret:
    - DATABASE_URL
    - REDIS_URL
    - JWT_SECRET
    - SITE_KEK_SEED
    - LANGFUSE_PUBLIC_KEY
    - LANGFUSE_SECRET_KEY
    - LANGFUSE_HOST

accessories:
  postgres:
    image: postgres:16-alpine
    host: 62.171.145.76
    env:
      clear:
        POSTGRES_DB: canna
        POSTGRES_USER: canna
        PGTZ: UTC
        TZ: UTC
      secret:
        - POSTGRES_PASSWORD
    directories:
      - canna_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    host: 62.171.145.76
    cmd: redis-server --appendonly yes
    directories:
      - canna_redis_data:/data

  # openwebui removed 2026-06-17 — replaced by canna-agent (ops/agent/kamal/deploy.yml)
  # app.cannabr.org now served by @canna/agent (Next 16 + assistant-ui).
