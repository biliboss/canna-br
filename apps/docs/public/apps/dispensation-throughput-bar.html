<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Throughput de Dispensações</title>
<style>


/* ═══════════════════════════════════════════════════════════════════════════
   TIER 1 — PRIMITIVE PALETTE
   Raw OKLCH ramps. Never consume these in components; use semantic aliases.
   ═══════════════════════════════════════════════════════════════════════════ */
:root {

  /* ── typography + scale (theme-agnostic) ─────────────────────────────── */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;

  --radius:    0.5rem;
  --radius-sm: 0.375rem;
  --radius-lg: 0.75rem;

  --text-xs:   0.6875rem;
  --text-sm:   0.8125rem;
  --text-base: 0.9375rem;
  --text-lg:   1.0625rem;

  /* ── spacing ladder (4-base) ─────────────────────────────────────────── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;

  /* ── z-index ladder ──────────────────────────────────────────────────── */
  --z-base:     1;
  --z-sticky:   10;
  --z-dropdown: 40;
  --z-overlay:  50;
  --z-toast:    60;

  /* ── density hook ────────────────────────────────────────────────────── */
  --density:    1;
  --space-pad:  calc(var(--space-3) * var(--density));   /* opt-in derived token */

  /* ── gray ramp ───────────────────────────────────────────────────────── */
  /* Hue 260 (blue-gray, same as design system base hue) */
  --gray-50:  oklch(0.98 0.002 260);
  --gray-100: oklch(0.96 0.003 260);
  --gray-200: oklch(0.92 0.005 260);
  --gray-300: oklch(0.82 0.008 260);
  --gray-400: oklch(0.70 0.012 260);
  --gray-500: oklch(0.58 0.016 260);
  --gray-600: oklch(0.46 0.020 260);
  --gray-700: oklch(0.36 0.018 260);
  --gray-800: oklch(0.27 0.012 260);
  --gray-900: oklch(0.20 0.008 260);
  --gray-950: oklch(0.14 0.006 260);

  /* ── blue ramp (hue 250) ─────────────────────────────────────────────── */
  --blue-50:  oklch(0.97 0.02  250);
  --blue-100: oklch(0.94 0.04  250);
  --blue-200: oklch(0.88 0.07  250);
  --blue-300: oklch(0.78 0.11  250);
  --blue-400: oklch(0.70 0.15  250);
  --blue-500: oklch(0.62 0.18  250);
  --blue-600: oklch(0.52 0.20  250);
  --blue-700: oklch(0.44 0.18  250);
  --blue-800: oklch(0.36 0.14  250);
  --blue-900: oklch(0.28 0.10  250);

  /* ── teal ramp (hue 175) ─────────────────────────────────────────────── */
  --teal-50:  oklch(0.97 0.02  175);
  --teal-100: oklch(0.93 0.05  175);
  --teal-200: oklch(0.86 0.09  175);
  --teal-300: oklch(0.76 0.13  175);
  --teal-400: oklch(0.68 0.16  175);
  --teal-500: oklch(0.60 0.17  175);
  --teal-600: oklch(0.50 0.16  175);
  --teal-700: oklch(0.42 0.14  175);
  --teal-800: oklch(0.34 0.11  175);
  --teal-900: oklch(0.26 0.08  175);

  /* ── cyan-green ramp (hue 148) ───────────────────────────────────────── */
  --cyan-50:  oklch(0.97 0.02  148);
  --cyan-100: oklch(0.93 0.05  148);
  --cyan-200: oklch(0.87 0.09  148);
  --cyan-300: oklch(0.78 0.13  148);
  --cyan-400: oklch(0.70 0.15  148);
  --cyan-500: oklch(0.62 0.15  148);
  --cyan-600: oklch(0.52 0.14  148);
  --cyan-700: oklch(0.44 0.12  148);
  --cyan-800: oklch(0.36 0.09  148);
  --cyan-900: oklch(0.28 0.07  148);

  /* ── green ramp (hue 150) ────────────────────────────────────────────── */
  --green-50:  oklch(0.97 0.03  150);
  --green-100: oklch(0.93 0.06  150);
  --green-200: oklch(0.87 0.10  150);
  --green-300: oklch(0.78 0.15  150);
  --green-400: oklch(0.70 0.18  150);
  --green-500: oklch(0.62 0.19  150);
  --green-600: oklch(0.50 0.18  150);
  --green-700: oklch(0.42 0.16  150);
  --green-800: oklch(0.34 0.12  150);
  --green-900: oklch(0.26 0.08  150);

  /* ── amber-green ramp (hue 95) ───────────────────────────────────────── */
  --amber-green-50:  oklch(0.97 0.03   95);
  --amber-green-100: oklch(0.93 0.07   95);
  --amber-green-200: oklch(0.87 0.12   95);
  --amber-green-300: oklch(0.78 0.15   95);
  --amber-green-400: oklch(0.70 0.15   95);
  --amber-green-500: oklch(0.62 0.14   95);
  --amber-green-600: oklch(0.52 0.13   95);
  --amber-green-700: oklch(0.44 0.11   95);
  --amber-green-800: oklch(0.36 0.09   95);
  --amber-green-900: oklch(0.28 0.06   95);

  /* ── amber ramp (hue 80) ─────────────────────────────────────────────── */
  --amber-50:  oklch(0.97 0.04   80);
  --amber-100: oklch(0.93 0.08   80);
  --amber-200: oklch(0.88 0.13   80);
  --amber-300: oklch(0.82 0.17   80);
  --amber-400: oklch(0.76 0.17   80);
  --amber-500: oklch(0.68 0.16   80);
  --amber-600: oklch(0.60 0.17   75);
  --amber-700: oklch(0.50 0.16   75);
  --amber-800: oklch(0.42 0.13   75);
  --amber-900: oklch(0.34 0.09   75);

  /* ── orange ramp (hue 45) ────────────────────────────────────────────── */
  --orange-50:  oklch(0.97 0.04   45);
  --orange-100: oklch(0.93 0.08   45);
  --orange-200: oklch(0.87 0.13   45);
  --orange-300: oklch(0.80 0.18   45);
  --orange-400: oklch(0.74 0.21   45);
  --orange-500: oklch(0.68 0.20   45);
  --orange-600: oklch(0.56 0.20   45);
  --orange-700: oklch(0.46 0.18   45);
  --orange-800: oklch(0.38 0.14   45);
  --orange-900: oklch(0.30 0.10   45);

  /* ── red ramp (hue 25) ───────────────────────────────────────────────── */
  --red-50:  oklch(0.97 0.03   25);
  --red-100: oklch(0.93 0.07   25);
  --red-200: oklch(0.87 0.12   25);
  --red-300: oklch(0.78 0.18   25);
  --red-400: oklch(0.70 0.22   25);
  --red-500: oklch(0.62 0.22   25);
  --red-600: oklch(0.52 0.24   25);
  --red-700: oklch(0.44 0.22   25);
  --red-800: oklch(0.36 0.18   25);
  --red-900: oklch(0.28 0.13   25);

  /* ── violet ramp (hue 305) ───────────────────────────────────────────── */
  --violet-50:  oklch(0.97 0.02  305);
  --violet-100: oklch(0.93 0.05  305);
  --violet-200: oklch(0.87 0.09  305);
  --violet-300: oklch(0.78 0.13  305);
  --violet-400: oklch(0.70 0.16  305);
  --violet-500: oklch(0.62 0.18  305);
  --violet-600: oklch(0.52 0.18  305);
  --violet-700: oklch(0.44 0.16  305);
  --violet-800: oklch(0.36 0.12  305);
  --violet-900: oklch(0.28 0.09  305);

  /* ── slate ramp (hue 270) ────────────────────────────────────────────── */
  --slate-50:  oklch(0.97 0.01  270);
  --slate-100: oklch(0.93 0.02  270);
  --slate-200: oklch(0.87 0.03  270);
  --slate-300: oklch(0.78 0.05  270);
  --slate-400: oklch(0.70 0.08  270);
  --slate-500: oklch(0.62 0.10  270);
  --slate-600: oklch(0.52 0.10  270);
  --slate-700: oklch(0.44 0.09  270);
  --slate-800: oklch(0.36 0.07  270);
  --slate-900: oklch(0.28 0.05  270);

  /* ── aqua ramp (hue 200) ─────────────────────────────────────────────── */
  --aqua-50:  oklch(0.97 0.02  200);
  --aqua-100: oklch(0.93 0.05  200);
  --aqua-200: oklch(0.87 0.09  200);
  --aqua-300: oklch(0.78 0.13  200);
  --aqua-400: oklch(0.70 0.14  200);
  --aqua-500: oklch(0.62 0.14  200);
  --aqua-600: oklch(0.52 0.13  200);
  --aqua-700: oklch(0.44 0.11  200);
  --aqua-800: oklch(0.36 0.09  200);
  --aqua-900: oklch(0.28 0.07  200);
}

/* ── density compact override ─────────────────────────────────────────────── */
[data-density="compact"] {
  --density: 0.75;
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIER 2 — DARK THEME (default)
   Semantic aliases referencing primitives. Near-Linear: near-black bg,
   elevation via lightness steps (+0.05/+0.10), not shadow.
   ═══════════════════════════════════════════════════════════════════════════ */
[data-theme="dark"] {

  /* surfaces */
  --background:        var(--gray-950);         /* oklch(0.14 0.006 260) */
  --foreground:        oklch(0.95 0.004 260);   /* near-white + slight blue tint */
  --card:              oklch(0.18 0.007 260);   /* gray-950 +L0.04 */
  --card-foreground:   oklch(0.95 0.004 260);
  --muted:             oklch(0.22 0.008 260);   /* +L0.08 from bg */
  --muted-foreground:  oklch(0.62 0.018 260);
  --border:            oklch(0.27 0.010 260);   /* --gray-800 ish */
  --input:             oklch(0.27 0.010 260);
  --ring:              var(--blue-500);         /* oklch(0.62 0.18 250) */
  --focus-ring:        oklch(0.80 0.16 250);    /* higher-L = higher contrast on dark bg */

  /* brand */
  --primary:           var(--blue-500);         /* oklch(0.62 0.18 250) */
  --primary-foreground:oklch(0.97 0.005 260);
  --accent:            oklch(0.23 0.012 260);   /* card +L0.05 */
  --accent-foreground: oklch(0.95 0.004 260);

  /* shadows — dark elevates via bg lightness, shadow is secondary */
  --shadow:    0 1px 3px oklch(0 0 0 / 0.40), 0 1px 2px oklch(0 0 0 / 0.24);
  --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.55), 0 2px 8px oklch(0 0 0 / 0.30);

  /* scrim / overlay — dialog backdrop */
  --scrim:   oklch(0 0 0 / 0.60);
  --overlay: oklch(0 0 0 / 0.55);

  /* status */
  --success:              var(--green-400);     /* oklch(0.70 0.18 150) */
  --success-foreground:   oklch(0.97 0.01 150);
  --warning:              var(--amber-400);     /* oklch(0.76 0.17 80) */
  --warning-foreground:   oklch(0.18 0.04  80);
  --destructive:          var(--red-500);       /* oklch(0.62 0.22 25) */
  --destructive-foreground: oklch(0.97 0.01 25);

  /* kanban */
  --on-track: var(--green-400);                 /* oklch(0.70 0.18 150) */
  --at-risk:  var(--amber-400);                 /* oklch(0.76 0.17 80) */
  --aging:    var(--orange-500);                /* oklch(0.68 0.20 45) */
  --done:     oklch(0.58 0.04 260);             /* muted slate — no primitive needed */
  --blocked:  var(--red-500);                   /* oklch(0.62 0.22 25) */

  /* class of service */
  --cos-expedite:   var(--red-500);             /* oklch(0.62 0.22 25) */
  --cos-fixed-date: var(--amber-400);           /* oklch(0.76 0.17 80) */
  --cos-standard:   var(--blue-500);            /* oklch(0.62 0.18 250) */
  --cos-intangible: oklch(0.58 0.04 260);

  /* ── chart ramp — dark, same-L arc (0.58–0.68) ──────────────────────────
   * s0 Done    → blue      — bottom CFD band (largest)
   * s1 In Test → teal
   * s2 In Dev  → cyan-green
   * s3 Analysis→ amber-green
   * s4 Backlog → violet    — top band (shows growth pressure)
   * s5–s7      → extra series: scatter / histogram / forecast
   * Uniform L across hues = equal perceptual weight in stacked CFD.
   * ────────────────────────────────────────────────────────────────────── */
  --chart-1: var(--blue-500);                   /* oklch(0.62 0.18 250) */
  --chart-2: oklch(0.64 0.16 175);              /* teal-400 ish */
  --chart-3: oklch(0.66 0.15 148);              /* cyan-400 ish */
  --chart-4: oklch(0.68 0.14  95);              /* amber-green-400 ish */
  --chart-5: var(--violet-500);                 /* oklch(0.62 0.18 305) */
  --chart-6: oklch(0.64 0.13  35);              /* warm amber extra */
  --chart-7: var(--slate-500);                  /* oklch(0.62 0.10 270) */
  --chart-8: var(--aqua-500);                   /* oklch(0.62 0.14 200) */

  /* flight levels — dark */
  --fl-1: oklch(0.64 0.16 175);                 /* teal   — operational FL1 */
  --fl-2: var(--blue-500);                      /* blue   — coordination FL2 */
  --fl-3: var(--violet-500);                    /* violet — strategic FL3 */
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIER 2 — LIGHT THEME
   Semantic aliases referencing primitives. Near-Vercel/shadcn:
   warm near-white bg, card = pure white + box-shadow elevation.
   Primary shifted to blue-600 for AA on white (≥4.5:1).
   ═══════════════════════════════════════════════════════════════════════════ */
[data-theme="light"] {

  /* surfaces */
  --background:        var(--gray-50);          /* oklch(0.98 0.002 260) */
  --foreground:        oklch(0.18 0.012 260);
  --card:              oklch(1.00 0.000   0);   /* pure white */
  --card-foreground:   oklch(0.18 0.012 260);
  --muted:             var(--gray-100);         /* oklch(0.96 0.003 260) */
  --muted-foreground:  oklch(0.46 0.022 260);
  --border:            var(--gray-200);         /* oklch(0.92 0.005 260) ish */
  --input:             var(--gray-200);
  --ring:              var(--blue-600);         /* oklch(0.52 0.20 250) */
  --focus-ring:        oklch(0.40 0.22 250);    /* deeper blue = higher contrast on white */

  /* brand */
  --primary:           var(--blue-600);         /* oklch(0.52 0.20 250) */
  --primary-foreground:oklch(0.99 0.004 260);
  --accent:            var(--gray-100);         /* oklch(0.96 0.003 260) ish */
  --accent-foreground: oklch(0.22 0.015 260);

  /* shadows — light uses actual shadow for elevation */
  --shadow:    0 1px 3px oklch(0.18 0.01 260 / 0.10), 0 1px 2px oklch(0.18 0.01 260 / 0.06);
  --shadow-lg: 0 8px 24px oklch(0.18 0.01 260 / 0.14), 0 2px 8px oklch(0.18 0.01 260 / 0.08);

  /* scrim / overlay — dialog backdrop, still dark but less opaque on light bg */
  --scrim:   oklch(0.10 0.01 260 / 0.50);
  --overlay: oklch(0.10 0.01 260 / 0.45);

  /* status */
  --success:              var(--green-600);     /* oklch(0.50 0.18 150) — AA on white */
  --success-foreground:   oklch(0.99 0.01 150);
  --warning:              var(--amber-600);     /* oklch(0.60 0.17 75) */
  --warning-foreground:   oklch(0.99 0.01  75);
  --destructive:          var(--red-600);       /* oklch(0.52 0.24 25) */
  --destructive-foreground: oklch(0.99 0.01 25);

  /* kanban */
  --on-track: var(--green-600);                 /* oklch(0.50 0.18 150) */
  --at-risk:  var(--amber-600);                 /* oklch(0.60 0.17 75) */
  --aging:    var(--orange-600);                /* oklch(0.56 0.20 45) */
  --done:     oklch(0.48 0.04 260);
  --blocked:  var(--red-600);                   /* oklch(0.52 0.24 25) */

  /* class of service */
  --cos-expedite:   var(--red-600);
  --cos-fixed-date: var(--amber-600);
  --cos-standard:   var(--blue-600);
  --cos-intangible: oklch(0.48 0.04 260);

  /* ── chart ramp — light theme, lower-L for legibility on near-white ─────
   * L range: 0.42–0.56 (vs 0.58–0.68 in dark).
   * +0.02 chroma vs dark counterparts = more saturation compensates for
   *   lighter bg washing out mid-L hues.
   * Hue arc preserved (blue→teal→cyan-green→amber-green→violet) so CFD
   *   band identity is consistent with dark theme at a glance.
   * ────────────────────────────────────────────────────────────────────── */
  --chart-1: oklch(0.46 0.20 250);   /* blue       — Done / primary series */
  --chart-2: oklch(0.48 0.18 175);   /* teal       — In Test */
  --chart-3: oklch(0.50 0.17 148);   /* cyan-green — In Dev */
  --chart-4: oklch(0.52 0.16  95);   /* amber-green— In Analysis */
  --chart-5: oklch(0.44 0.20 305);   /* violet     — Backlog */
  --chart-6: oklch(0.50 0.15  35);   /* amber      — extra */
  --chart-7: oklch(0.44 0.12 270);   /* slate      — extra */
  --chart-8: oklch(0.48 0.15 200);   /* aqua       — extra */

  /* flight levels — light */
  --fl-1: oklch(0.48 0.18 175);      /* teal   — operational FL1 */
  --fl-2: oklch(0.46 0.20 250);      /* blue   — coordination FL2 */
  --fl-3: oklch(0.44 0.20 305);      /* violet — strategic FL3 */
}

/* ═══════════════════════════════════════════════════════════════════════════
   TIER 2 — HIGH-CONTRAST THEME
   Proof that two-tier pays off: only alias overrides, no new leaf math.
   Near-black/near-white extremes + max border + saturated unambiguous status.
   Rationale: AAA contrast (7:1+) for users with low vision, harsh environments,
   or OLED glare. Inspired by WCAG 2.2 §1.4.6 Enhanced Contrast.
   ═══════════════════════════════════════════════════════════════════════════ */
[data-theme="high-contrast"] {

  /* surfaces — near-black bg, pure white fg */
  --background:        oklch(0.06 0.003 260);   /* near-black */
  --foreground:        oklch(0.99 0.000   0);   /* pure white */
  --card:              oklch(0.10 0.004 260);   /* slightly lighter than bg */
  --card-foreground:   oklch(0.99 0.000   0);
  --muted:             oklch(0.14 0.005 260);
  --muted-foreground:  oklch(0.82 0.005 260);   /* high-contrast muted: still legible */
  --border:            oklch(0.50 0.008 260);   /* thick visual border */
  --input:             oklch(0.50 0.008 260);
  --ring:              oklch(1.00 0.000   0);   /* white ring on near-black */
  --focus-ring:        oklch(0.96 0.06  100);   /* vivid yellow-green for max visibility */

  /* brand */
  --primary:           oklch(0.72 0.20 250);    /* brighter blue for max contrast on near-black */
  --primary-foreground:oklch(0.04 0.002 260);   /* near-black text on bright primary */
  --accent:            oklch(0.18 0.006 260);
  --accent-foreground: oklch(0.99 0.000   0);

  /* shadows — near-invisible on near-black; border carries the elevation signal */
  --shadow:    0 0 0 1px oklch(0.50 0.008 260);
  --shadow-lg: 0 0 0 2px oklch(0.50 0.008 260);

  /* scrim / overlay */
  --scrim:   oklch(0 0 0 / 0.80);
  --overlay: oklch(0 0 0 / 0.75);

  /* status — fully saturated, maximum chroma for each hue */
  --success:              oklch(0.80 0.22 150);  /* bright green */
  --success-foreground:   oklch(0.06 0.01 150);
  --warning:              oklch(0.88 0.20  80);  /* vivid amber */
  --warning-foreground:   oklch(0.06 0.02  80);
  --destructive:          oklch(0.72 0.28  25);  /* vivid red */
  --destructive-foreground: oklch(0.06 0.01 25);

  /* kanban — each hue distinct + vivid */
  --on-track: oklch(0.80 0.22 150);             /* bright green */
  --at-risk:  oklch(0.88 0.20  80);             /* vivid amber */
  --aging:    oklch(0.82 0.24  45);             /* vivid orange */
  --done:     oklch(0.72 0.06 260);             /* bright slate */
  --blocked:  oklch(0.72 0.28  25);             /* vivid red */

  /* class of service — same saturated approach */
  --cos-expedite:   oklch(0.72 0.28  25);
  --cos-fixed-date: oklch(0.88 0.20  80);
  --cos-standard:   oklch(0.72 0.20 250);
  --cos-intangible: oklch(0.72 0.06 260);

  /* chart ramp — max-contrast arc on near-black, vivid chroma */
  --chart-1: oklch(0.72 0.22 250);   /* vivid blue */
  --chart-2: oklch(0.74 0.20 175);   /* vivid teal */
  --chart-3: oklch(0.76 0.19 148);   /* vivid cyan-green */
  --chart-4: oklch(0.78 0.18  95);   /* vivid amber-green */
  --chart-5: oklch(0.70 0.22 305);   /* vivid violet */
  --chart-6: oklch(0.76 0.18  35);   /* vivid amber */
  --chart-7: oklch(0.68 0.14 270);   /* bright slate */
  --chart-8: oklch(0.74 0.18 200);   /* vivid aqua */

  /* flight levels — high-contrast */
  --fl-1: oklch(0.74 0.20 175);      /* vivid teal */
  --fl-2: oklch(0.72 0.22 250);      /* vivid blue */
  --fl-3: oklch(0.70 0.22 305);      /* vivid violet */
}

/* ═══════════════════════════════════════════════════════════════════════════
   BASE RESET
   ═══════════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--background);
  color: var(--foreground);
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── density proof surface: statcard uses --space-pad ───────────────────── */
.aui-statcard {
  padding: var(--space-pad, var(--space-3)) calc(var(--space-pad, var(--space-3)) + 4px);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}


/* ── widget chrome ───────────────────────────────────────────────────────── */
.aui-widget {
  background: var(--background);
  padding: var(--space-5) var(--space-4);
  max-width: 760px;
  margin: 0 auto;
}
.aui-widget[data-wide] { max-width: none; }
.aui-widget__head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}
.aui-widget__heading {
  display: flex;
  flex-direction: column;
  gap: 3px;
  min-width: 0;
}
.aui-widget__title {
  font-size: var(--text-lg);
  font-weight: 650;
  letter-spacing: -0.025em;
  line-height: 1.25;
}
.aui-widget__subtitle {
  color: var(--muted-foreground);
  font-size: var(--text-sm);
  line-height: 1.4;
}
.aui-widget__body {
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

/* ── badge / label ───────────────────────────────────────────────────────────
 * Visual taxonomy:
 *   status     — pill + filled dot + tinted bg + colored border  (3 simultaneous cues)
 *   class-of-service — solid-fill pill, no dot, uppercase tiny text
 *   flight-level — outline pill (ring only, transparent bg)
 *   category   — muted capsule, uppercase, no dot
 *   semantic   — neutral/primary/success/warning/destructive with dot
 * ────────────────────────────────────────────────────────────────────────── */
.aui-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: var(--text-xs);
  font-weight: 600;
  line-height: 1.5;
  letter-spacing: 0.01em;
  border: 1px solid var(--border);
  color: var(--muted-foreground);
  background: var(--muted);
  white-space: nowrap;
  vertical-align: middle;
}

/* default dot */
.aui-badge::before {
  content: "";
  flex-shrink: 0;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* ── category — no dot, uppercase micro-label */
.aui-badge--category {
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-size: 0.625rem;
  font-weight: 700;
  background: transparent;
  border-color: var(--border);
  color: var(--muted-foreground);
}
.aui-badge--category::before { display: none; }

/* ── semantic variants (dot style) */
.aui-badge--neutral {
  color: var(--muted-foreground);
  background: var(--muted);
  border-color: var(--border);
}
.aui-badge--primary {
  color: var(--primary);
  background: color-mix(in oklch, var(--primary) 12%, transparent);
  border-color: color-mix(in oklch, var(--primary) 30%, transparent);
}
.aui-badge--success {
  color: var(--success);
  background: color-mix(in oklch, var(--success) 12%, transparent);
  border-color: color-mix(in oklch, var(--success) 28%, transparent);
}
.aui-badge--warning {
  color: var(--warning);
  background: color-mix(in oklch, var(--warning) 14%, transparent);
  border-color: color-mix(in oklch, var(--warning) 32%, transparent);
}
.aui-badge--destructive {
  color: var(--destructive);
  background: color-mix(in oklch, var(--destructive) 14%, transparent);
  border-color: color-mix(in oklch, var(--destructive) 32%, transparent);
}

/* ── status variants (kanban workflow states)
 * Same dot+tinted formula; each maps to its semantic color token.
 * The coloured border provides the 3rd visual cue for colorblind accessibility. */
.aui-badge--on-track {
  color: var(--on-track);
  background: color-mix(in oklch, var(--on-track) 12%, transparent);
  border-color: color-mix(in oklch, var(--on-track) 30%, transparent);
}
.aui-badge--at-risk {
  color: var(--at-risk);
  background: color-mix(in oklch, var(--at-risk) 14%, transparent);
  border-color: color-mix(in oklch, var(--at-risk) 34%, transparent);
}
.aui-badge--aging {
  color: var(--aging);
  background: color-mix(in oklch, var(--aging) 14%, transparent);
  border-color: color-mix(in oklch, var(--aging) 34%, transparent);
}
.aui-badge--blocked {
  color: var(--blocked);
  background: color-mix(in oklch, var(--blocked) 14%, transparent);
  border-color: color-mix(in oklch, var(--blocked) 34%, transparent);
}
.aui-badge--done {
  color: var(--done);
  background: color-mix(in oklch, var(--done) 14%, transparent);
  border-color: color-mix(in oklch, var(--done) 28%, transparent);
}

/* ── class-of-service variants
 * Solid fill + no dot = different visual language from status (priority signal, not state).
 * Uses more opaque fill so CoS reads as "category tag" not "status indicator". */
.aui-badge--expedite {
  color: var(--cos-expedite);
  background: color-mix(in oklch, var(--cos-expedite) 18%, transparent);
  border-color: color-mix(in oklch, var(--cos-expedite) 40%, transparent);
  font-weight: 700;
}
.aui-badge--fixed-date {
  color: var(--cos-fixed-date);
  background: color-mix(in oklch, var(--cos-fixed-date) 16%, transparent);
  border-color: color-mix(in oklch, var(--cos-fixed-date) 38%, transparent);
}
.aui-badge--standard {
  color: var(--cos-standard);
  background: color-mix(in oklch, var(--cos-standard) 12%, transparent);
  border-color: color-mix(in oklch, var(--cos-standard) 28%, transparent);
}
.aui-badge--intangible {
  color: var(--cos-intangible);
  background: color-mix(in oklch, var(--cos-intangible) 14%, transparent);
  border-color: color-mix(in oklch, var(--cos-intangible) 26%, transparent);
}

/* ── flight-level variants
 * Outline/ring style — transparent bg, colored border only.
 * Visual language = "level marker" (structural), distinct from status (workflow state). */
.aui-badge--fl1,
.aui-badge--fl2,
.aui-badge--fl3 {
  background: transparent;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.aui-badge--fl1::before { display: none; }
.aui-badge--fl2::before { display: none; }
.aui-badge--fl3::before { display: none; }
.aui-badge--fl1 {
  color: var(--fl-1);
  border-color: color-mix(in oklch, var(--fl-1) 50%, transparent);
}
.aui-badge--fl2 {
  color: var(--fl-2);
  border-color: color-mix(in oklch, var(--fl-2) 50%, transparent);
}
.aui-badge--fl3 {
  color: var(--fl-3);
  border-color: color-mix(in oklch, var(--fl-3) 50%, transparent);
}

/* ── button ──────────────────────────────────────────────────────────────── */
.aui-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: var(--text-sm);
  font-weight: 550;
  font-family: inherit;
  letter-spacing: 0.01em;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--foreground);
  cursor: pointer;
  transition: background 0.15s ease-out,
              border-color 0.15s ease-out,
              box-shadow 0.15s ease-out,
              opacity 0.15s ease-out,
              transform 0.12s ease-out;
  user-select: none;
}
.aui-btn:hover {
  background: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.aui-btn:active { transform: translateY(0); }
.aui-btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}
.aui-btn:disabled { opacity: 0.45; cursor: default; pointer-events: none; }
.aui-btn--primary {
  background: var(--primary);
  color: var(--primary-foreground);
  border-color: transparent;
}
.aui-btn--primary:hover {
  background: color-mix(in oklch, var(--primary) 88%, var(--foreground));
  opacity: 1;
}
.aui-btn--ghost {
  background: transparent;
  border-color: transparent;
  color: var(--muted-foreground);
}
.aui-btn--ghost:hover {
  background: var(--accent);
  color: var(--foreground);
}
.aui-btn--sm {
  padding: 4px 10px;
  font-size: var(--text-xs);
  border-radius: calc(var(--radius-sm) - 1px);
}

/* ── card ────────────────────────────────────────────────────────────────── */
.aui-card {
  background: var(--card);
  color: var(--card-foreground);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--space-4);
  box-shadow: var(--shadow);
}

/* ── stat ─────────────────────────────────────────────────────────────────
 * tabular-nums on all numeric values (Linear/Stripe dashboard convention).
 * letter-spacing -0.03em on large values prevents optical spreading. */
.aui-stat { display: flex; flex-direction: column; gap: 3px; }
.aui-stat__label {
  font-size: var(--text-xs);
  color: var(--muted-foreground);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  font-weight: 650;
  line-height: 1.3;
}
.aui-stat__value {
  font-size: 1.625rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.aui-stat__unit {
  font-size: var(--text-sm);
  color: var(--muted-foreground);
  font-weight: 500;
  margin-left: 3px;
  letter-spacing: 0;
}
.aui-stat__delta {
  font-size: var(--text-xs);
  font-weight: 650;
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-variant-numeric: tabular-nums;
}
.aui-stat--up   .aui-stat__delta { color: var(--on-track); }
.aui-stat--down .aui-stat__delta { color: var(--blocked); }

/* ── chip ────────────────────────────────────────────────────────────────── */
.aui-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  background: var(--muted);
  color: var(--muted-foreground);
  font-size: var(--text-xs);
  font-weight: 550;
  border: 1px solid transparent;
}

/* ── progress ────────────────────────────────────────────────────────────── */
.aui-progress {
  height: 5px;
  border-radius: 999px;
  background: var(--muted);
  overflow: hidden;
}
.aui-progress__bar {
  height: 100%;
  border-radius: 999px;
  background: var(--primary);
  transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.aui-progress--over .aui-progress__bar { background: var(--blocked); }

/* ── misc atoms ───────────────────────────────────────────────────────────── */
.aui-divider {
  height: 1px;
  background: var(--border);
  border: 0;
  margin: var(--space-3) 0;
}
.aui-kbd {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  background: var(--muted);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 5px;
  letter-spacing: 0.02em;
}


/* ── KPI grid + statcard ─────────────────────────────────────────────────── */
.aui-kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 130px), 1fr));
  gap: var(--space-3);
}
.aui-statcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--space-3) var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  box-shadow: var(--shadow);
  overflow: hidden; /* clips sparkline SVG overflow:visible paths */
  transition: box-shadow 0.15s ease-out, transform 0.12s ease-out;
}
.aui-statcard:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-1px);
}
.aui-statcard__row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: var(--space-2);
}
.aui-statcard__spark {
  opacity: 0.85;
  flex-shrink: 0;
  /* Constrain sparkline host — prevents SVG style.width:100% from expanding */
  width: 64px;
  overflow: hidden;
}
.aui-statcard__spark svg {
  display: block;
  width: 64px !important;
  height: 26px !important;
}

/* ── legend ──────────────────────────────────────────────────────────────── */
.aui-legend {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2) var(--space-4);
  font-size: var(--text-xs);
  color: var(--muted-foreground);
}
.aui-legend__item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: default;
}
.aui-legend__swatch {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  display: inline-block;
  flex-shrink: 0;
}

/* ── tooltip ─────────────────────────────────────────────────────────────────
 * Frosted glass effect — backdrop-filter blur works in CSP-sandboxed iframes.
 * Position is managed by charts.ts (fixed, pointer-events: none). */
.aui-tooltip {
  background: color-mix(in oklch, var(--card) 90%, transparent);
  backdrop-filter: blur(12px) saturate(1.5);
  -webkit-backdrop-filter: blur(12px) saturate(1.5);
  color: var(--card-foreground);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: var(--text-xs);
  line-height: 1.55;
  box-shadow: var(--shadow-lg);
  max-width: 240px;
  pointer-events: none;
}
.aui-tooltip b   { font-weight: 700; }
.aui-tooltip .k  { color: var(--muted-foreground); font-weight: 500; }
.aui-tooltip hr  { border: none; border-top: 1px solid var(--border); margin: 5px 0; }

/* ── empty state ─────────────────────────────────────────────────────────── */
.aui-empty {
  color: var(--muted-foreground);
  font-size: var(--text-sm);
  text-align: center;
  padding: var(--space-6);
  line-height: 1.6;
}

/* ── controls ────────────────────────────────────────────────────────────── */
.aui-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--space-3);
}
.aui-segment {
  display: inline-flex;
  background: var(--muted);
  border-radius: var(--radius-sm);
  padding: 2px;
  gap: 1px;
  border: 1px solid var(--border);
}
.aui-segment__btn {
  border: 0;
  background: transparent;
  color: var(--muted-foreground);
  font: inherit;
  font-size: var(--text-xs);
  font-weight: 550;
  padding: 4px 10px;
  border-radius: calc(var(--radius-sm) - 2px);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, box-shadow 0.12s;
  white-space: nowrap;
}
.aui-segment__btn:hover { color: var(--foreground); }
.aui-segment__btn.is-active {
  background: var(--card);
  color: var(--foreground);
  box-shadow: 0 1px 3px oklch(0 0 0 / 0.22), 0 0 0 1px var(--border);
}
.aui-segment__btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 1px;
}
.aui-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.aui-field__label {
  font-size: var(--text-xs);
  color: var(--muted-foreground);
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  gap: var(--space-3);
  letter-spacing: 0.01em;
}
.aui-slider {
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 999px;
  background: var(--muted);
  outline: none;
  cursor: pointer;
}
.aui-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  border: 2px solid var(--card);
  box-shadow: 0 0 0 1px var(--primary);
  transition: box-shadow 0.12s;
}
.aui-slider:focus-visible::-webkit-slider-thumb {
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--ring) 35%, transparent);
}
.aui-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--primary);
  cursor: pointer;
  border: 2px solid var(--card);
}

/* ── chart SVG ───────────────────────────────────────────────────────────────
 * All SVG elements emitted by charts.ts; styled here by class.
 * Grid: very subtle (opacity 0.4, dash 2 3) — structure without noise.
 * Rules: full-opacity stroke for warning/danger — must read over band fill.
 * Bands: slightly transparent so stroke seams show between CFD layers. */
/* overflow visible allows axes/labels to breathe outside chart bounds;
 * sparklines are clipped by their host via overflow:hidden */
.aui-chart { overflow: visible; }
.aui-spark { overflow: hidden; }

.aui-axis .aui-tick {
  fill: var(--muted-foreground);
  font-size: 10px;
  font-family: var(--font-sans);
  font-variant-numeric: tabular-nums;
}
.aui-tickline {
  stroke: var(--border);
  stroke-width: 1;
}
.aui-grid {
  stroke: var(--border);
  stroke-width: 1;
  stroke-dasharray: 2 3;
  opacity: 0.40;
}
.aui-axis-label {
  fill: var(--muted-foreground);
  font-size: 10px;
  font-family: var(--font-sans);
  font-weight: 600;
  letter-spacing: 0.04em;
}

/* lines + areas */
.aui-line {
  stroke: var(--chart-1);
  stroke-width: 2;
  stroke-linejoin: round;
  stroke-linecap: round;
  fill: none;
}
.aui-area {
  fill: var(--chart-1);
  opacity: 0.15;
}

/* CFD stacked bands — opacity 0.92 keeps colors vivid while seams stay legible */
.aui-band {
  stroke: var(--background);
  stroke-width: 0.75;
  opacity: 0.92;
}
.aui-band.s0 { fill: var(--chart-1); }
.aui-band.s1 { fill: var(--chart-2); }
.aui-band.s2 { fill: var(--chart-3); }
.aui-band.s3 { fill: var(--chart-4); }
.aui-band.s4 { fill: var(--chart-5); }
.aui-band.s5 { fill: var(--chart-6); }
.aui-band.s6 { fill: var(--chart-7); }
.aui-band.s7 { fill: var(--chart-8); }

/* bars */
.aui-bars { }
.aui-bar         { fill: var(--chart-1); }
.aui-bar.muted   { fill: var(--muted); }
.aui-bar.accent  { fill: var(--chart-2); }

/* scatter dots */
.aui-dots { }
.aui-dot {
  fill: var(--chart-1);
  opacity: 0.80;
  transition: opacity 0.10s, r 0.10s;
  cursor: pointer;
}
.aui-dot:hover        { opacity: 1; }
.aui-dot.at-risk      { fill: var(--at-risk); }
.aui-dot.blocked      { fill: var(--blocked); }
.aui-dot.on-track     { fill: var(--on-track); }

/* percentile / reference rules
 * Default = muted dashed; p85/warn = amber solid; p95/danger = red solid.
 * Solid stroke (no dash) for warning/danger so they override the grid visually. */
.aui-rule-line {
  stroke: var(--muted-foreground);
  stroke-width: 1;
  stroke-dasharray: 4 3;
  opacity: 0.60;
}
.aui-rule-label {
  fill: var(--muted-foreground);
  font-size: 9.5px;
  font-family: var(--font-sans);
  font-weight: 650;
}
.aui-rule.p85 .aui-rule-line,
.aui-rule.warn .aui-rule-line {
  stroke: var(--at-risk);
  stroke-dasharray: none;
  opacity: 1;
  stroke-width: 1.5;
}
.aui-rule.p95 .aui-rule-line,
.aui-rule.danger .aui-rule-line {
  stroke: var(--blocked);
  stroke-dasharray: none;
  opacity: 1;
  stroke-width: 1.5;
}
.aui-rule.p85 .aui-rule-label,
.aui-rule.warn .aui-rule-label   { fill: var(--at-risk); }
.aui-rule.p95 .aui-rule-label,
.aui-rule.danger .aui-rule-label { fill: var(--blocked); }

/* sparkline */
.aui-spark { display: block; }
.aui-spark .spark {
  stroke: var(--primary);
  stroke-width: 1.75;
  fill: none;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.aui-spark-end { fill: var(--primary); }

/* ── board organism ───────────────────────────────────────────────────────── */
.aui-board {
  display: flex;
  gap: var(--space-3);
  overflow-x: auto;
  padding-bottom: var(--space-3);
  /* overflow contract for iframe/generative UI */
  max-width: 100%;
}
.aui-col {
  flex: 1 1 0;
  min-width: 145px;
  background: var(--muted);
  border-radius: var(--radius);
  padding: var(--space-2);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  border: 1px solid var(--border);
}
.aui-col__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
  padding: 3px 5px;
}
.aui-col__title {
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted-foreground);
}
.aui-col__count {
  font-size: var(--text-xs);
  font-variant-numeric: tabular-nums;
  color: var(--muted-foreground);
  font-weight: 650;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0 6px;
  min-width: 20px;
  text-align: center;
}
.aui-col__count.over {
  color: var(--blocked);
  border-color: color-mix(in oklch, var(--blocked) 40%, transparent);
  background: color-mix(in oklch, var(--blocked) 12%, transparent);

/* cardlet — Linear-style: left accent 3px, hover lift + shadow */
.aui-cardlet {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cos-standard);
  border-radius: var(--radius-sm);
  padding: var(--space-2) var(--space-3);
  cursor: pointer;
  transition: border-color 0.12s, transform 0.10s ease-out, box-shadow 0.12s ease-out;
}

  border-color: color-mix(in oklch, var(--ring) 60%, var(--border));
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

  outline: 2px solid var(--ring);
  outline-offset: 1px;
}
.aui-cardlet.cos-expedite   { border-left-color: var(--cos-expedite); }
.aui-cardlet.cos-fixed-date { border-left-color: var(--cos-fixed-date); }

.aui-cardlet.blocked        { border-left-color: var(--blocked); }
.aui-cardlet__title {
  font-size: var(--text-sm);
  font-weight: 550;
  line-height: 1.35;
  margin-bottom: 5px;
}
.aui-cardlet__meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px;
}

/* ── flight levels ───────────────────────────────────────────────────────── */
.aui-fl {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}
.aui-fl__lane {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--space-3) var(--space-4);
  background: var(--card);
  border-left-width: 3px;
  box-shadow: var(--shadow);
}
.aui-fl__lane.fl3 { border-left-color: var(--fl-3); }
.aui-fl__lane.fl2 { border-left-color: var(--fl-2); }
.aui-fl__lane.fl1 { border-left-color: var(--fl-1); }
.aui-fl__lane-head {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.aui-fl__lane-head h3 {
  font-size: var(--text-sm);
  font-weight: 700;
  letter-spacing: -0.01em;
}
.aui-fl__lane-head .sub {
  font-size: var(--text-xs);
  color: var(--muted-foreground);
}
.aui-fl__items {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

<script>(function () {
  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function palette() {
    return {
      chart: [cssVar('--chart-1'),cssVar('--chart-2'),cssVar('--chart-3'),cssVar('--chart-4'),cssVar('--chart-5'),cssVar('--chart-6'),cssVar('--chart-7'),cssVar('--chart-8')],
      fg: cssVar('--foreground'),
      muted: cssVar('--muted-foreground'),
      border: cssVar('--border'),
      card: cssVar('--card'),
      bg: cssVar('--background'),
      onTrack: cssVar('--on-track'),
      atRisk: cssVar('--at-risk'),
      aging: cssVar('--aging'),
      blocked: cssVar('--blocked'),
      done: cssVar('--done'),
      font: cssVar('--font-sans') || 'system-ui, sans-serif'
    };
  }
  function baseOption(p) {
    return {
      color: p.chart,
      textStyle: { color: p.fg, fontFamily: p.font, fontSize: 12 },
      animationDuration: 320,
      grid: { left: 8, right: 14, top: 18, bottom: 8, containLabel: true },
      legend: { textStyle: { color: p.muted, fontSize: 11 }, inactiveColor: p.border, icon: 'roundRect', itemWidth: 11, itemHeight: 11, top: 0 },
      tooltip: {
        backgroundColor: p.card,
        borderColor: p.border,
        borderWidth: 1,
        textStyle: { color: p.fg, fontSize: 12 },
        extraCssText: 'border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);padding:8px 12px;',
        axisPointer: { type: 'line', lineStyle: { color: p.muted, type: 'dashed', width: 1 } }
      },
      xAxis: {
        axisLine: { lineStyle: { color: p.border } },
        axisTick: { lineStyle: { color: p.border } },
        axisLabel: { color: p.muted, fontSize: 10, hideOverlap: true },
        splitLine: { show: false }
      },
      yAxis: {
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { color: p.muted, fontSize: 10 },
        splitLine: { lineStyle: { color: p.border, type: 'dashed', opacity: 0.5 } }
      }
    };
  }
  function isObj(v) { return v && typeof v === 'object' && !Array.isArray(v); }
  function merge(base, over) {
    if (!isObj(base)) return over;
    var out = {}; var k;
    for (k in base) out[k] = base[k];
    for (k in over) { out[k] = (isObj(out[k]) && isObj(over[k])) ? merge(out[k], over[k]) : over[k]; }
    return out;
  }

  function mount(el, opts) {
    opts = opts || {};
    var chart = window.echarts.init(el, null, { renderer: 'canvas' });
    var lastUser = null;
    function apply() {
      if (lastUser == null) return;
      var pal = palette();
      // builder form recomputes every color on theme flip; object form is static

      chart.setOption(merge(baseOption(pal), opt), { notMerge: true });
    }
    function setOption(userOpt) { lastUser = userOpt; apply(); ping(); }
    function ping() { try { if (window.AuiBridge) AuiBridge.notifySize(); } catch (e) {} }

    var ro = window.ResizeObserver ? new ResizeObserver(function () { chart.resize(); ping(); }) : null;
    if (ro) ro.observe(el);
    window.addEventListener('resize', function () { chart.resize(); });

<script>

function render(data) {
  var root = document.getElementById('aui-body');
  if (window.__cannaDispThroughputCtl) {
    try { window.__cannaDispThroughputCtl.dispose(); } catch (e) {}
    window.__cannaDispThroughputCtl = null;
  }
  root.innerHTML =
    '<div class="aui-kpis" id="kpis"></div>' +
    '<div id="chart" style="width:100%;height:300px"></div>' +
    '<div class="aui-legend" id="legend"></div>';

  var buckets = data.buckets || [];
  var weeks = data.weeks || [];
  var N = buckets.length;

  // ── KPI strip ──────────────────────────────────────────────────────────────
  var grid = document.getElementById('kpis');
  var kpis = [
    { label: 'Total 12 sem', value: (data.grandTotal != null ? data.grandTotal : 0), unit: '' },
    { label: 'Média / sem', value: (data.avgPerWeek != null ? data.avgPerWeek : 0), unit: '/sem' },
    { label: 'Cultivo próprio', value: (data.sumInternal != null ? data.sumInternal : 0), unit: '' },
    { label: 'Última semana', value: (data.lastWeekTotal != null ? data.lastWeekTotal : 0), unit: '' }
  ];
  kpis.forEach(function (k) {
    var cell = document.createElement('div');
    cell.className = 'aui-statcard';
    var stat = document.createElement('div');
    stat.className = 'aui-stat';
    stat.innerHTML =
      '<span class="aui-stat__label">' + k.label + '</span>' +
      '<span><span class="aui-stat__value">' + k.value + '</span>' +
      (k.unit ? '<span class="aui-stat__unit">' + k.unit + '</span>' : '') +
      '</span>';
    cell.appendChild(stat);
    grid.appendChild(cell);
  });

  if (!N) {
    document.getElementById('chart').innerHTML =
      '<div class="aui-empty">Sem dados de dispensação</div>';
    return;
  }

  // ── ECharts option builder (recolors on theme flip) ──────────────────────────
  var internal = buckets.map(function (b) { return b.internal; });
  var external = buckets.map(function (b) { return b.external; });
  var donation = buckets.map(function (b) { return b.donation; });
  var rolling = buckets.map(function (b) { return (b.rollingAvg != null) ? b.rollingAvg : null; });

  function build(pal) {
    return {
      grid: { left: 4, right: 14, top: 14, bottom: 4, containLabel: true },
      legend: { show: true, top: 0, data: ['Cultivo Próprio', 'Compra Externa', 'Doação', 'Média 4 sem'] },
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        formatter: function (rows) {
          if (!rows || !rows.length) return '';
          var idx = rows[0].dataIndex;
          var b = buckets[idx] || {};
          var avgRow = (b.rollingAvg != null)
            ? '<br/><span style="opacity:.65">média 4 sem</span> <b>' + b.rollingAvg + '</b>'
            : '';
          return '<b>' + (b.week || '') + '</b>' +
            '<br/><span style="opacity:.65">cultivo próprio</span> <b>' + (b.internal != null ? b.internal : 0) + '</b>' +
            '<br/><span style="opacity:.65">compra externa</span> <b>' + (b.external != null ? b.external : 0) + '</b>' +
            '<br/><span style="opacity:.65">doação</span> <b>' + (b.donation != null ? b.donation : 0) + '</b>' +
            '<br/><span style="opacity:.65">total</span> <b>' + (b.total != null ? b.total : 0) + '</b>' +
            avgRow;
        }
      },
      xAxis: {
        type: 'category',
        data: weeks,
        axisLabel: {
          interval: function (i) { return i === 0 || i === N - 1 || i % 2 === 0; },
          formatter: function (v) { return String(v).replace('2026-', ''); }
        }
      },
      yAxis: {
        type: 'value',
        name: 'dispensações / sem',
        nameLocation: 'end',
        nameTextStyle: { color: pal.muted, fontSize: 10, align: 'left' },
        min: 0
      },
      series: [
        {
          type: 'bar',
          name: 'Cultivo Próprio',
          stack: 'origem',
          data: internal,
          barMaxWidth: 30,
          color: pal.chart[0],
          itemStyle: { color: pal.chart[0] }
        },
        {
          type: 'bar',
          name: 'Compra Externa',
          stack: 'origem',
          data: external,
          barMaxWidth: 30,
          color: pal.chart[1],
          itemStyle: { color: pal.chart[1] }
        },
        {
          type: 'bar',
          name: 'Doação',
          stack: 'origem',
          data: donation,
          barMaxWidth: 30,
          color: pal.chart[2],
          itemStyle: { color: pal.chart[2], borderRadius: [3, 3, 0, 0] }
        },
        {
          type: 'line',
          name: 'Média 4 sem',
          data: rolling,
          smooth: true,
          connectNulls: true,
          symbol: 'circle',
          symbolSize: 5,
          color: pal.muted,
          lineStyle: { color: pal.muted, width: 2, type: 'dashed' },
          itemStyle: { color: pal.muted }
        }
      ]
    };
  }

  var ctl = AuiECharts.mount(document.getElementById('chart'));
  window.__cannaDispThroughputCtl = ctl;
  ctl.setOption(build);

  // ── legend ───────────────────────────────────────────────────────────────────
  var legend = document.getElementById('legend');
  legend.innerHTML =
    '<span class="aui-legend__item">' +
      '<span class="aui-legend__swatch" style="background:var(--chart-1)"></span>Cultivo Próprio</span>' +
    '<span class="aui-legend__item">' +
      '<span class="aui-legend__swatch" style="background:var(--chart-2)"></span>Compra Externa</span>' +
    '<span class="aui-legend__item">' +
      '<span class="aui-legend__swatch" style="background:var(--chart-3)"></span>Doação</span>' +
    '<span class="aui-legend__item">' +
      '<span class="aui-legend__swatch" style="background:var(--muted-foreground)"></span>Média 4 sem</span>';
}

</script>
<script>
AuiBridge.init({
  onData: (typeof render === 'function') ? render : null,
  onInput: (typeof onInput === 'function') ? onInput : null,
  onTheme: (typeof onTheme === 'function') ? onTheme : null
});
</script>
</body>
</html>
